    <script>
      /* Anti-Flash: Modus + Akzentfarbe vor dem ersten Paint setzen */
      (function () {
        try {
          var m = localStorage.getItem("b4y-theme-mode") || localStorage.getItem("b4y-base") || "system";
          var care = localStorage.getItem("b4y-care") === "true";
          var accent = localStorage.getItem("b4y-accent") || "blau";
          var dark = m === "dark" || (m === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var el = document.documentElement;
          if (care) { dark ? el.classList.add("dark", "warm-dark") : el.classList.add("warm-light"); }
          else if (dark) { el.classList.add("dark"); }
          el.setAttribute("data-accent", accent);
        } catch (e) {}
      })();
    </script>
